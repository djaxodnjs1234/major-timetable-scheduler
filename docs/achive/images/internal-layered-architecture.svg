<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="660" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">전공 시간표 자동 편성 프로젝트 계층 구조</title>
  <desc id="desc">WPF 본 제품과 Python 프로토타입, 그리고 Domain, Data, Solver, Scoring, ViewModel, WPF UI 계층의 단방향 의존성 구조</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box-blue { fill: #eff6ff; stroke: #60a5fa; }
      .box-green { fill: #ecfdf5; stroke: #34d399; }
      .box-amber { fill: #fffbeb; stroke: #f59e0b; }
      .box-purple { fill: #f5f3ff; stroke: #a78bfa; }
      .title { font: 700 26px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #0f172a; }
      .label { font: 700 18px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #1e293b; }
      .small { font: 500 14px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrowhead); fill: none; }
      .note { font: 600 14px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1100" height="660" />
  <text class="title" x="550" y="44" text-anchor="middle">프로젝트 내부 구조: 본 제품 WPF + 회귀 베이스라인 Python</text>

  <rect class="box box-purple" x="50" y="92" width="230" height="470" />
  <text class="label" x="165" y="128" text-anchor="middle">prototype-py</text>
  <text class="small" x="165" y="154" text-anchor="middle">Python CP-SAT + Tkinter</text>
  <text class="small" x="165" y="182" text-anchor="middle">초기 설계와 동작 기준</text>
  <text class="small" x="165" y="210" text-anchor="middle">WPF 포팅 회귀 비교용</text>
  <rect class="box" x="80" y="250" width="170" height="58" />
  <text class="small" x="165" y="284" text-anchor="middle">domain / csp / ui</text>
  <rect class="box" x="80" y="330" width="170" height="58" />
  <text class="small" x="165" y="364" text-anchor="middle">data_source.py</text>
  <rect class="box" x="80" y="410" width="170" height="58" />
  <text class="small" x="165" y="444" text-anchor="middle">회귀 베이스라인</text>

  <rect class="box box-blue" x="370" y="92" width="660" height="470" />
  <text class="label" x="700" y="128" text-anchor="middle">wpf / TimetableScheduler.slnx</text>
  <text class="small" x="700" y="154" text-anchor="middle">현재 구현 대상: C# / WPF / .NET 8 / MVVM / SQLite / OR-Tools</text>

  <rect class="box box-green" x="440" y="190" width="200" height="58" />
  <text class="label" x="540" y="224" text-anchor="middle">Domain</text>
  <text class="small" x="540" y="241" text-anchor="middle">Course, Professor, Room</text>

  <rect class="box box-green" x="700" y="190" width="200" height="58" />
  <text class="label" x="800" y="224" text-anchor="middle">Data</text>
  <text class="small" x="800" y="241" text-anchor="middle">XlsxLoader, SQLite</text>

  <rect class="box box-amber" x="440" y="292" width="200" height="58" />
  <text class="label" x="540" y="326" text-anchor="middle">Solver</text>
  <text class="small" x="540" y="343" text-anchor="middle">CP-SAT, HC/SC</text>

  <rect class="box box-amber" x="700" y="292" width="200" height="58" />
  <text class="label" x="800" y="326" text-anchor="middle">Scoring</text>
  <text class="small" x="800" y="343" text-anchor="middle">SC 점수, Top-M</text>

  <rect class="box" x="440" y="394" width="200" height="58" />
  <text class="label" x="540" y="428" text-anchor="middle">ViewModel</text>
  <text class="small" x="540" y="445" text-anchor="middle">Workspace, Pages, Grid</text>

  <rect class="box" x="700" y="394" width="200" height="58" />
  <text class="label" x="800" y="428" text-anchor="middle">WPF UI</text>
  <text class="small" x="800" y="445" text-anchor="middle">XAML Views, Controls</text>

  <rect class="box" x="570" y="496" width="200" height="58" />
  <text class="label" x="670" y="530" text-anchor="middle">Tests</text>
  <text class="small" x="670" y="547" text-anchor="middle">xUnit 통합/회귀 검증</text>

  <path class="arrow" d="M540 248 L540 292" />
  <path class="arrow" d="M540 350 L540 394" />
  <path class="arrow" d="M800 248 L800 292" />
  <path class="arrow" d="M800 350 L800 394" />
  <path class="arrow" d="M640 321 L700 321" />
  <path class="arrow" d="M640 423 L700 423" />
  <path class="arrow" d="M670 452 L670 496" />
  <path class="arrow" d="M280 330 C330 330,330 330,370 330" />

  <text class="note" x="550" y="607" text-anchor="middle">핵심 원칙: Domain은 순수 모델, Solver는 시간표 생성, Scoring은 해 비교, ViewModel은 상태/흐름, WPF는 화면만 담당</text>
</svg>
