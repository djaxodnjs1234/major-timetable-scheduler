<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="title desc">
  <title id="title">솔버 변수와 제약 묶음</title>
  <desc id="desc">x, y, start, day 변수와 Basic, Block, Grouping, Soft Constraints 사이 관계</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .var { fill: #eff6ff; stroke: #60a5fa; }
      .hc { fill: #fff7ed; stroke: #fb923c; }
      .sc { fill: #ecfdf5; stroke: #34d399; }
      .title { font: 700 26px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #0f172a; }
      .label { font: 700 18px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #1e293b; }
      .small { font: 500 14px 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b" /></marker>
  </defs>
  <rect class="bg" width="1100" height="650" />
  <text class="title" x="550" y="44" text-anchor="middle">CP-SAT 모델의 핵심 변수와 제약 묶음</text>

  <rect class="box var" x="70" y="110" width="250" height="110" />
  <text class="label" x="195" y="146" text-anchor="middle">x[c,d,p,r]</text>
  <text class="small" x="195" y="174" text-anchor="middle">과목 c가 요일 d, 교시 p,</text>
  <text class="small" x="195" y="198" text-anchor="middle">강의실 r에 배치되면 1</text>

  <rect class="box var" x="390" y="110" width="250" height="110" />
  <text class="label" x="515" y="146" text-anchor="middle">y[c,d,p]</text>
  <text class="small" x="515" y="174" text-anchor="middle">강의실과 무관한 슬롯 점유</text>
  <text class="small" x="515" y="198" text-anchor="middle">Σ room x = K · y</text>

  <rect class="box var" x="710" y="110" width="250" height="110" />
  <text class="label" x="835" y="146" text-anchor="middle">start / day</text>
  <text class="small" x="835" y="174" text-anchor="middle">블록 시작 위치와 요일</text>
  <text class="small" x="835" y="198" text-anchor="middle">연속 수업·요일 간격 제약용</text>

  <rect class="box hc" x="70" y="310" width="250" height="150" />
  <text class="label" x="195" y="346" text-anchor="middle">BasicHcs</text>
  <text class="small" x="195" y="374" text-anchor="middle">HC-01 강의실 중복 금지</text>
  <text class="small" x="195" y="398" text-anchor="middle">HC-02 교수 중복 금지</text>
  <text class="small" x="195" y="422" text-anchor="middle">HC-03/04/08/11/12/13</text>

  <rect class="box hc" x="390" y="310" width="250" height="150" />
  <text class="label" x="515" y="346" text-anchor="middle">BlockHcs</text>
  <text class="small" x="515" y="374" text-anchor="middle">HC-06 블록 연속성</text>
  <text class="small" x="515" y="398" text-anchor="middle">HC-14/15/18/19/20/21</text>
  <text class="small" x="515" y="422" text-anchor="middle">고정방·교수방 일관성</text>

  <rect class="box hc" x="710" y="310" width="250" height="150" />
  <text class="label" x="835" y="346" text-anchor="middle">GroupingHcs</text>
  <text class="small" x="835" y="374" text-anchor="middle">HC-16 교차수강 cyclic shift</text>
  <text class="small" x="835" y="398" text-anchor="middle">HC-17 재수강 안전 분반</text>
  <text class="small" x="835" y="422" text-anchor="middle">분반·학년 충돌 보정</text>

  <rect class="box sc" x="230" y="525" width="640" height="74" />
  <text class="label" x="550" y="555" text-anchor="middle">SoftConstraints</text>
  <text class="small" x="550" y="582" text-anchor="middle">SC-01 특수 시간 회피 · SC-02 교수 요일 집중 · SC-03 블록 요일 간격</text>

  <path class="arrow" d="M320 165 L390 165" />
  <path class="arrow" d="M640 165 L710 165" />
  <path class="arrow" d="M195 220 L195 310" />
  <path class="arrow" d="M515 220 L515 310" />
  <path class="arrow" d="M835 220 L835 310" />
  <path class="arrow" d="M195 460 C195 500,360 500,420 525" />
  <path class="arrow" d="M515 460 L515 525" />
  <path class="arrow" d="M835 460 C835 500,700 500,650 525" />
</svg>
