<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">테스트와 회귀 베이스라인 구성요소</title>
  <desc id="desc">Python 프로토타입, WPF 구현, xUnit 테스트, 통합 테스트가 회귀 검증을 구성하는 방식</desc>
  <defs><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.test{fill:#ecfdf5;stroke:#34d399}.base{fill:#f5f3ff;stroke:#a78bfa}.title{font:700 24px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#0f172a}.label{font:700 17px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#1e293b}.small{font:500 13px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#475569}.arrow{stroke:#64748b;stroke-width:2;marker-end:url(#a);fill:none}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect class="bg" width="900" height="520"/>
  <text class="title" x="450" y="42" text-anchor="middle">구성요소 7: 테스트와 회귀 검증</text>
  <rect class="box base" x="90" y="140" width="190" height="90"/><text class="label" x="185" y="176" text-anchor="middle">Python Prototype</text><text class="small" x="185" y="204" text-anchor="middle">회귀 베이스라인</text>
  <rect class="box" x="365" y="140" width="190" height="90"/><text class="label" x="460" y="176" text-anchor="middle">WPF 구현</text><text class="small" x="460" y="204" text-anchor="middle">포팅 대상</text>
  <rect class="box test" x="640" y="140" width="190" height="90"/><text class="label" x="735" y="176" text-anchor="middle">xUnit Tests</text><text class="small" x="735" y="204" text-anchor="middle">Domain/Solver/UI 검증</text>
  <rect class="box test" x="365" y="330" width="250" height="90"/><text class="label" x="490" y="366" text-anchor="middle">End-to-End</text><text class="small" x="490" y="394" text-anchor="middle">xlsx → solver → scoring</text>
  <path class="arrow" d="M280 185 L365 185"/><path class="arrow" d="M555 185 L640 185"/><path class="arrow" d="M735 230 C735 300,590 300,540 330"/><path class="arrow" d="M460 230 L480 330"/>
  <text class="small" x="450" y="476" text-anchor="middle">테스트는 단순 빌드 확인이 아니라 실제 입력부터 솔버 결과까지 이어지는 동작을 검증합니다.</text>
</svg>
