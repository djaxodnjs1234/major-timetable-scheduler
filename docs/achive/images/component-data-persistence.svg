<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">데이터 입력과 저장 구성요소</title>
  <desc id="desc">xlsx 파일, XlsxLoader, WorkspaceService, SQLite 저장소, 저장된 시간표 스냅샷의 흐름</desc>
  <defs><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.data{fill:#eff6ff;stroke:#60a5fa}.store{fill:#fef3c7;stroke:#f59e0b}.title{font:700 24px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#0f172a}.label{font:700 17px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#1e293b}.small{font:500 13px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#475569}.arrow{stroke:#64748b;stroke-width:2;marker-end:url(#a);fill:none}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect class="bg" width="900" height="520"/>
  <text class="title" x="450" y="42" text-anchor="middle">구성요소 2: 데이터 입력과 저장</text>
  <rect class="box data" x="60" y="150" width="170" height="96"/><text class="label" x="145" y="186" text-anchor="middle">xlsx 편람</text><text class="small" x="145" y="214" text-anchor="middle">강좌/교수/강의실</text>
  <rect class="box data" x="300" y="150" width="170" height="96"/><text class="label" x="385" y="186" text-anchor="middle">XlsxLoader</text><text class="small" x="385" y="214" text-anchor="middle">컬럼 파싱 / 블록 추론</text>
  <rect class="box" x="540" y="150" width="170" height="96"/><text class="label" x="625" y="186" text-anchor="middle">Workspace</text><text class="small" x="625" y="214" text-anchor="middle">현재 작업 상태</text>
  <rect class="box store" x="300" y="330" width="170" height="96"/><text class="label" x="385" y="366" text-anchor="middle">SQLite DB</text><text class="small" x="385" y="394" text-anchor="middle">CRUD 즉시 저장</text>
  <rect class="box store" x="540" y="330" width="230" height="96"/><text class="label" x="655" y="366" text-anchor="middle">SavedTimetable</text><text class="small" x="655" y="394" text-anchor="middle">배치 결과 + 제약 스냅샷</text>
  <path class="arrow" d="M230 198 L300 198"/><path class="arrow" d="M470 198 L540 198"/><path class="arrow" d="M625 246 C625 294,470 294,430 330"/><path class="arrow" d="M625 246 L655 330"/>
  <text class="small" x="450" y="476" text-anchor="middle">새 시간표는 전역 Workspace를 쓰고, 기존 시간표 편집은 저장 당시 스냅샷으로 만든 세션 Workspace를 씁니다.</text>
</svg>
