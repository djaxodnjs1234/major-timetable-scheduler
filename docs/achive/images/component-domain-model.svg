<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">도메인 모델 구성요소</title>
  <desc id="desc">Course, Professor, Room, CrossGroup, RetakeScenario가 시간표 문제를 표현하는 방식</desc>
  <defs><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.main{fill:#eff6ff;stroke:#60a5fa}.sub{fill:#ecfdf5;stroke:#34d399}.title{font:700 24px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#0f172a}.label{font:700 17px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#1e293b}.small{font:500 13px 'Segoe UI','Apple SD Gothic Neo',sans-serif;fill:#475569}.arrow{stroke:#64748b;stroke-width:2;marker-end:url(#a);fill:none}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect class="bg" width="900" height="520"/>
  <text class="title" x="450" y="42" text-anchor="middle">구성요소 1: 도메인 모델</text>
  <rect class="box main" x="330" y="92" width="240" height="130"/>
  <text class="label" x="450" y="126" text-anchor="middle">Course</text>
  <text class="small" x="450" y="154" text-anchor="middle">학년, 시수, 분반, 교수</text>
  <text class="small" x="450" y="178" text-anchor="middle">FixedRooms, FixedSlots</text>
  <text class="small" x="450" y="202" text-anchor="middle">BlockStructure, CoteachProfs</text>
  <rect class="box sub" x="70" y="300" width="180" height="92"/>
  <text class="label" x="160" y="334" text-anchor="middle">Professor</text>
  <text class="small" x="160" y="362" text-anchor="middle">불가능 시간</text>
  <text class="small" x="160" y="384" text-anchor="middle">허용 강의실</text>
  <rect class="box sub" x="320" y="300" width="180" height="92"/>
  <text class="label" x="410" y="334" text-anchor="middle">Room</text>
  <text class="small" x="410" y="362" text-anchor="middle">강의실 ID / 이름</text>
  <rect class="box sub" x="570" y="300" width="250" height="92"/>
  <text class="label" x="695" y="334" text-anchor="middle">Cross / Retake</text>
  <text class="small" x="695" y="362" text-anchor="middle">교차수강 묶음</text>
  <text class="small" x="695" y="384" text-anchor="middle">재수강 안전 분반 조건</text>
  <path class="arrow" d="M390 222 L190 300"/><path class="arrow" d="M450 222 L410 300"/><path class="arrow" d="M520 222 L670 300"/>
  <text class="small" x="450" y="462" text-anchor="middle">이 계층은 외부 의존성이 없는 순수 데이터 구조이며, 모든 계층이 이 모델을 기준으로 동작합니다.</text>
</svg>
